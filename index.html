<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scoundrel</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="app">
        <header class="header">
            <h1>SCOUNDREL</h1>
        </header>

        <div class="board">
            <!-- LEFT COLUMN: Equipment + Deck -->
            <section class="column left-column">
                <div class="panel equipment-panel">
                    <h2 class="panel-title">Equipment</h2>
                    <div id="equipmentContent">
                        <div class="equipped-weapon"></div>
                    </div>
                </div>

                <div class="panel deck-panel">
                    <h2 class="panel-title">Deck <span class="panel-count" id="deckCount">44</span></h2>
                    <div class="pile" id="deckPile">
                    </div>
                </div>
            </section>

            <!-- MIDDLE COLUMN: Room Cards -->
            <section class="column middle-column">
                <div class="panel room-panel">
                    <h2 class="panel-title room-title">
                        <span class="stat-item">HEALTH <span class="panel-count" id="healthDisplay">20</span></span>
                        <span class="stat-item">ROOM <span class="panel-count" id="roomDisplay">I</span></span>
                        <span class="stat-item">CARDS <span class="panel-count" id="roomCount">0</span></span>
                    </h2>
                    <div class="cards-display" id="roomCards">
                        <div class="placeholder">Initializing...</div>
                    </div>
                </div>
            </section>

            <!-- RIGHT COLUMN: Actions + Discard -->
            <section class="column right-column">
                <div class="panel actions-panel">
                    <h2 class="panel-title">Actions</h2>
                    <div class="actions-buttons" id="actionButtons">
                        <button class="btn btn-skip" id="skipRoomBtn" onclick="game.skipRoom()" disabled>Skip</button>
                    </div>
                </div>

                <div class="panel discard-panel">
                    <h2 class="panel-title">Discard <span class="panel-count" id="discardCount">0</span></h2>
                    <div class="pile" id="discardPile">
                    </div>
                </div>

                <div class="panel menu-panel">
                    <button class="btn btn-primary" onclick="game.newGame()">New Game</button>
                </div>
            </section>
        </div>

        <div id="messageContainer" class="message-container"></div>
    </div>

    <!-- Game Over Modal -->
    <div id="gameOverModal" class="modal">
        <div class="modal-content">
            <h2 id="gameOverTitle">Game Over</h2>
            <div id="gameOverMessage"></div>
            <div class="score-section">
                <p>Final Score:</p>
                <div class="final-score" id="finalScore">0</div>
                <p>Monsters Killed: <span id="killedMonstersScore">0</span></p>
                <p>Monsters Remaining: <span id="remainingMonstersScore">0</span></p>
            </div>
            <button class="btn btn-primary" style="width: 100%;" onclick="game.newGame()">Play Again</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>

</html>
