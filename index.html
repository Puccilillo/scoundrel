<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scoundrel - Card Game</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>⚔️ SCOUNDREL ⚔️</h1>
            <p>Dungeon Card Game</p>
        </div>

        <div class="game-info">
            <div class="info-box">
                <div class="info-label">❤️ HEALTH</div>
                <div class="health-bar-container">
                    <div class="health-bar" id="healthBar"></div>
                </div>
                <div class="health-subtext">
                    <span id="healthDisplay">20</span>/20
                </div>
            </div>
            <div class="info-box">
                <div class="info-label">📜 DECK</div>
                <div class="info-value deck-value" id="deckDisplay">44</div>
            </div>
            <div class="info-box">
                <div class="info-label">🗺️ ROOM</div>
                <div class="info-value" id="roomDisplay">I</div>
            </div>
        </div>

        <div class="room-progress">
            <div class="progress-label">Dungeon Path</div>
            <div class="room-progress-path" id="roomProgressPath">
                <div class="node current" title="Room I"></div>
            </div>
        </div>

        <div class="main-game">
            <!-- Player Area -->
            <div class="player-area">
                <div class="section-title">EQUIPMENT</div>
                <div class="weapon-display" id="weaponDisplay">
                    <div class="muted">No weapon equipped</div>
                </div>
            </div>

            <!-- Room Area -->
            <div class="room-area">
                <div class="turn-info" id="turnInfo">
                    Cards used: <span id="cardsUsed">0</span>/3
                </div>
                <div class="section-title">ROOM</div>
                <div class="cards-grid" id="roomCards">
                    <div class="room-cards-placeholder">
                        Initializing game...
                    </div>
                </div>
            </div>

            <!-- Actions Area -->
            <div class="action-area">
                <div class="section-title">MENU</div>
                <div class="actions-footer">
                    <button class="btn-secondary" onclick="game.newGame()">New Game</button>
                </div>
                <div class="section-title">ACTIONS</div>
                <div id="actionButtons" class="actions-list">
                    <button class="btn-danger" id="skipRoomBtn" onclick="game.skipRoom()" disabled>Skip Room</button>
                    <!-- Additional action buttons will be generated here -->
                </div>
            </div>
        </div>

        <!-- Message Container (Fixed at Bottom) -->
        <div id="messageContainer"></div>
    </div>

    <!-- Game Over Modal -->
    <div id="gameOverModal" class="game-over">
        <div class="game-over-content">
            <h2 id="gameOverTitle">GAME OVER</h2>
            <p id="gameOverMessage"></p>
            <p class="game-over-score-label">Final Score:</p>
            <div class="final-score" id="finalScore"></div>
            <p>Monsters Killed: <span id="killedMonstersScore">0</span></p>
            <p>Monsters Remaining: <span id="remainingMonstersScore">0</span></p>
            <button class="btn-success" onclick="game.newGame()">
                Play Again
            </button>
        </div>
    </div>

    <script src="game.js"></script>
</body>

</html>
